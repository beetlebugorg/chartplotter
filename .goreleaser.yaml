# GoReleaser configuration for chartplotter.
# Docs: https://goreleaser.com
version: 2

project_name: chartplotter

before:
  hooks:
    - go mod tidy

# Two builds per platform, mirroring `make xbuild`:
#   - plain: needs `--s101 <dir>` at runtime (no IHO content embedded)
#   - _s101: self-contained, embeds the S-101 Portrayal + Feature Catalogues
#     (the release workflow runs `make sync-s101` first to populate the embed dir).
#     That catalogue is IHO material with no declared license — see
#     THIRD-PARTY-NOTICES.md.
# Shared settings live in an anchor so the two only differ by the embed tag.
builds:
  - id: chartplotter
    main: ./cmd/chartplotter
    binary: chartplotter
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{ .Version }}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    # No 32-bit / niche targets: the tile baker is memory-hungry.
  - id: chartplotter-s101
    main: ./cmd/chartplotter
    binary: chartplotter
    env: [CGO_ENABLED=0]
    tags: [embed_s101]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.version={{ .Version }}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: chartplotter
    ids: [chartplotter]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files: [README.md, LICENSE, THIRD-PARTY-NOTICES.md]
  - id: chartplotter-s101
    ids: [chartplotter-s101]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_s101"
    files: [README.md, LICENSE, THIRD-PARTY-NOTICES.md]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  # Repo is auto-detected from the git remote, so this targets whatever repo the
  # tag was pushed to (no owner/name mismatch to maintain).
  draft: false
  prerelease: auto
