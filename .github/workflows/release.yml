name: Release

# chartplotter publishes per-platform binaries on every v* tag. The binary is a
# CGO build that statically links the native libtile57 engine and can't be
# cross-compiled by an off-the-shelf builder, so the binaries are cross-built HERE
# per platform, then a plain shell step archives + checksums + releases them:
#
#   xbuild (ubuntu)  → linux + windows, amd64/arm64  via `make xbuild` (zig cc)
#   macos  (arm64)   → darwin amd64/arm64            built with native apple clang
#   release (ubuntu) → downloads both artifact sets, archives + checksums + release
#
# The engine is the public github.com/beetlebugorg/tile57 (its submodules hold the
# IHO S-101 catalogues); it is checked out as a SIBLING dir named tile57 so go.mod's
# ../tile57/bindings/go replace and the binding's cgo LDFLAGS resolve — the same
# layout as ci.yml / docs.yml. main.version + main.engineCommit are stamped into
# every binary via ldflags (preserved across all three jobs).
#
# Packaging is plain shell (tar/zip + checksums + gh release) — no GoReleaser, no
# paid license — so nothing here depends on a GoReleaser Pro key.
#
# NOTE: correct-by-construction but UNVALIDATED until a real v* tag is pushed —
# nothing runs on push/PR, and packaging needs the CI-built binaries.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---- linux + windows (amd64/arm64): CGO cross-compile with zig cc -------------
  xbuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chartplotter
        uses: actions/checkout@v7
        with:
          path: chartplotter
          fetch-depth: 0
      # The engine sits beside chartplotter as ../tile57 (go.mod replaces the
      # binding at ../tile57/bindings/go); its submodules carry the IHO catalogues.
      - name: Checkout tile57 (libtile57 engine)
        uses: actions/checkout@v7
        with:
          repository: beetlebugorg/tile57
          path: tile57
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: chartplotter/go.sum
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # xbuild-tile57.sh builds libtile57 per target with zig, then links each
      # binary with `zig cc`, emitting dist/chartplotter_${goos}_${goarch}${ext}
      # (ext=.exe for windows) for linux+windows amd64/arm64, stamping VERSION +
      # ENGINE_COMMIT (the Makefile derives ENGINE_COMMIT from ../tile57 HEAD).
      - name: Cross-build linux + windows binaries
        run: make -C chartplotter xbuild TILE57=../tile57 VERSION="${{ github.ref_name }}"

      - name: Upload linux + windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-xbuild
          path: chartplotter/dist/chartplotter_*
          if-no-files-found: error

  # ---- darwin (amd64/arm64): built natively on macOS with apple clang ----------
  # darwin is NOT cross-built by xbuild: with GOOS=darwin, Go's own crypto/x509 +
  # runtime/cgo link Apple's Security/CoreFoundation frameworks, which Zig does not
  # bundle. The native apple clang (default CC here) does, so we build on a macOS
  # runner. arm64 is native to the runner; amd64 is a clang cross-target (-arch).
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout chartplotter
        uses: actions/checkout@v7
        with:
          path: chartplotter
          fetch-depth: 0
      - name: Checkout tile57 (libtile57 engine)
        uses: actions/checkout@v7
        with:
          repository: beetlebugorg/tile57
          path: tile57
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: chartplotter/go.sum
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # For each darwin arch: build libtile57.a for that arch with `zig build`
      # (Zig builds the STATIC LIB fine — only the final Go link needs Apple's
      # frameworks), normalizing the lib name exactly as scripts/xbuild-tile57.sh
      # does, then link with CGO using the NATIVE apple clang (with the matching
      # -arch so the cgo C objects agree with GOARCH; amd64 is a clang cross).
      - name: Build darwin binaries (native clang link)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ENGINE_COMMIT="$(git -C tile57 rev-parse --short=9 HEAD)"
          libdir="tile57/zig-out/lib"
          mkdir -p chartplotter/dist
          for arch in arm64 amd64; do
            case "$arch" in
              arm64) zt=aarch64-macos; clang_arch=arm64 ;;
              amd64) zt=x86_64-macos;  clang_arch=x86_64 ;;
            esac
            echo "→ darwin/$arch (libtile57 via zig -Dtarget=$zt, link via clang -arch $clang_arch)"
            # Rebuild the engine static lib for this arch; clear any stale lib first
            # (mirrors build_lib() in scripts/xbuild-tile57.sh — same name normalize).
            rm -f "$libdir/libtile57.a" "$libdir/tile57.lib"
            ( cd tile57 && zig build -Dtarget="$zt" -Doptimize=ReleaseFast )
            [ -f "$libdir/libtile57.a" ] || cp "$libdir/tile57.lib" "$libdir/libtile57.a"
            ( cd chartplotter && \
              CGO_ENABLED=1 GOOS=darwin GOARCH="$arch" \
              CC="clang -arch $clang_arch" CXX="clang++ -arch $clang_arch" \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${TAG} -X main.engineCommit=${ENGINE_COMMIT}" \
                -o "dist/chartplotter_darwin_${arch}" ./cmd/chartplotter )
          done
          ls -1 chartplotter/dist/chartplotter_darwin_*

      - name: Upload darwin binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: chartplotter/dist/chartplotter_darwin_*
          if-no-files-found: error

  # ---- package + publish: plain shell (no GoReleaser, no paid license) ---------
  # The binaries are already built by the two jobs above; this just archives each
  # (tar.gz for unix, zip for windows), writes checksums.txt, and creates the
  # GitHub release with all of it attached. (GoReleaser's prebuilt builder would do
  # the same packaging but is Pro-only; shell keeps the release path license-free.)
  release:
    runs-on: ubuntu-latest
    needs: [xbuild, macos]
    steps:
      - name: Checkout chartplotter
        uses: actions/checkout@v7
        with:
          path: chartplotter
          fetch-depth: 0

      # Land all six prebuilt binaries into dist/ (naming: chartplotter_{os}_{arch}
      # [.exe], from xbuild-tile57.sh + the macos job).
      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: chartplotter/dist

      # Archive each binary alongside README + LICENSE + THIRD-PARTY-NOTICES, then
      # one checksums.txt over the archives. tar.gz for unix, zip for windows.
      # upload-artifact drops the exec bit, so it's restored before archiving.
      - name: Package archives + checksums
        working-directory: chartplotter
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          out=release-assets
          mkdir -p "$out"
          for bin in dist/chartplotter_*; do
            base="$(basename "$bin")"          # chartplotter_linux_amd64[.exe]
            platform="${base#chartplotter_}"   # linux_amd64[.exe]
            stage="$(mktemp -d)"
            cp README.md LICENSE THIRD-PARTY-NOTICES.md "$stage/"
            if [ "${base##*.}" = "exe" ]; then
              platform="${platform%.exe}"
              cp "$bin" "$stage/chartplotter.exe"
              ( cd "$stage" && zip -q -r - . ) > "$out/chartplotter_${tag}_${platform}.zip"
            else
              cp "$bin" "$stage/chartplotter"
              chmod +x "$stage/chartplotter"
              tar -czf "$out/chartplotter_${tag}_${platform}.tar.gz" -C "$stage" .
            fi
            rm -rf "$stage"
          done
          ( cd "$out" && sha256sum chartplotter_* > checksums.txt )
          ls -1 "$out"

      - name: Create GitHub release
        working-directory: chartplotter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --verify-tag \
            --generate-notes \
            --notes "Per-platform binaries below. Each embeds the IHO S-101 catalogue (via the tile57 engine) — see THIRD-PARTY-NOTICES.md. Building from source per the README is the alternative." \
            release-assets/*

# TODO(signing): binaries are unsigned/unnotarized (the old quill hook was removed
# with the source-only pivot). macOS users hit Gatekeeper until notarization is
# wired back in.
