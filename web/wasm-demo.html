<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>real-time wasm tiles — demo</title>
  <link rel="stylesheet" href="./vendor/maplibre-gl.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; background: #c9edff; }
    #hud { position: absolute; left: 8px; top: 8px; z-index: 2; font: 12px/1.4 system-ui;
      background: rgba(255,255,255,.92); border-radius: 8px; padding: 8px 10px; box-shadow: 0 1px 6px rgba(0,0,0,.25);
      max-width: 320px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="hud">loading…</div>
  <script src="./vendor/maplibre-gl.js"></script>
  <script type="module">
    import { loadCells, registerTileProtocol } from "./wasm-tiles.mjs";
    const hud = document.getElementById("hud");
    const log = (m) => { hud.textContent = m; console.log(m); };

    // S-52 day palette → a fill-color match on the baked `color_token` attribute.
    const colortables = await (await fetch("./colortables.json")).json();
    const day = colortables.day || {};
    const colorMatch = (prop, fallback) => {
      const m = ["match", ["coalesce", ["get", prop], ""]];
      for (const tok in day) m.push(tok, day[tok]);
      m.push(fallback);
      return Object.keys(day).length ? m : fallback;
    };

    // 1) load the wasm baker + the raw cell bytes.
    const t0 = performance.now();
    const cellBytes = new Uint8Array(await (await fetch("./demo-cell.000")).arrayBuffer());
    const res = await loadCells({ US5MD1MC: cellBytes });
    log(`baker loaded ${res.names?.length} cell(s) in ${res.ms} ms — panning bakes tiles live`);

    // 2) register the cp:// protocol (real-time tiles + two-layer cache).
    const cache = registerTileProtocol(maplibregl, { namespace: "demo", memCap: 512*1024*1024, diskCap: 1024*1024*1024 });

    // 3) a MapLibre style whose chart source is baked on demand by the wasm.
    const map = new maplibregl.Map({
      container: "map",
      center: [-76.462, 38.962],
      zoom: 15,
      style: {
        version: 8,
        glyphs: "./glyphs/{fontstack}/{range}.pbf",
        sources: {
          chart: { type: "vector", tiles: ["cp://{z}/{x}/{y}"], minzoom: 13, maxzoom: 16 },
        },
        layers: [
          { id: "bg", type: "background", paint: { "background-color": day.DEPVS || "#61b7ff" } },
          { id: "areas", type: "fill", source: "chart", "source-layer": "areas",
            paint: { "fill-color": colorMatch("color_token", "#dfeff7") } },
          { id: "lines", type: "line", source: "chart", "source-layer": "lines",
            paint: { "line-color": colorMatch("color_token", "#33414d"), "line-width": ["coalesce", ["get", "width_px"], 1] } },
          { id: "complex", type: "line", source: "chart", "source-layer": "complex_lines",
            paint: { "line-color": colorMatch("color_token", "#7a5a2a"), "line-width": 1.2 } },
          { id: "soundings", type: "circle", source: "chart", "source-layer": "soundings",
            paint: { "circle-radius": 1.6, "circle-color": day.SNDG2 || "#5a5a5a" } },
        ],
      },
    });
    map.addControl(new maplibregl.NavigationControl());

    let baked = 0;
    const orig = globalThis.cpBakeTile;
    globalThis.cpBakeTile = (z, x, y) => { baked++; return orig(z, x, y); };
    map.on("idle", () => {
      const u = cache.usage();
      log(`baker: ${res.names?.length} cell · ${res.ms} ms\n` +
          `tiles baked: ${baked} · L1 ${(u.memBytes/1024).toFixed(0)} KB / ${u.memTiles} · L2 ${(u.diskBytes/1024).toFixed(0)} KB\n` +
          `hits L1 ${u.l1Hit} L2 ${u.l2Hit} · miss ${u.miss}`);
    });
    window._map = map; window._cache = cache;
  </script>
</body>
</html>
